<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 登录</title>
    <!-- Tailwind CSS v3 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- 统一的 Tailwind 配置 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2E5BFF', // 深蓝色
                        neutral: {
                            100: '#F5F7FA', // 浅灰色
                            200: '#E4E7EB',
                            300: '#CBD2D9',
                            400: '#9AA5B1',
                            500: '#7B8794',
                            600: '#616E7C',
                            700: '#52606D',
                            800: '#3E4C59',
                            900: '#323F4B',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .bg-gradient-primary {
                background: linear-gradient(135deg, #2E5BFF 0%, #1E3A8A 100%);
            }
            .transition-all-300 {
                transition: all 300ms ease-in-out;
            }
        }
    </style>
</head>
<body class="bg-neutral-100 min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-8">
            <img src="https://p6-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/rc/pc/super_tool/711628490c9d434cbd77361a4dfd757b~tplv-a9rns2rl98-image.image?lk3s=8e244e95&rcl=202603221511373D5EB5A8DA585AB365A8&rrcfp=f06b921b&x-expires=1776755571&x-signature=9Te4Fzbd739WEMAIoLl6ZuJfRHc%3D" alt="课后托管+研学服务平台" class="h-16 w-auto mx-auto">
            <h2 class="mt-2 text-2xl font-bold text-neutral-900">管理后台</h2>
            <p class="mt-1 text-sm text-neutral-600">请登录您的账号</p>
        </div>
        
        <!-- 登录表单 -->
        <div class="bg-white rounded-lg shadow-lg p-8">
            <form id="login-form" class="space-y-6">
                <!-- 用户名 -->
                <div>
                    <label for="username" class="block text-sm font-medium text-neutral-700 mb-1">用户名</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fa fa-user text-neutral-400"></i>
                        </div>
                        <input type="text" id="username" name="username" class="w-full pl-10 pr-3 py-2 border border-neutral-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" placeholder="请输入用户名" required>
                    </div>
                </div>
                
                <!-- 密码 -->
                <div>
                    <label for="password" class="block text-sm font-medium text-neutral-700 mb-1">密码</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fa fa-lock text-neutral-400"></i>
                        </div>
                        <input type="password" id="password" name="password" class="w-full pl-10 pr-3 py-2 border border-neutral-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" placeholder="请输入密码" required>
                        <button type="button" id="toggle-password" class="absolute inset-y-0 right-0 pr-3 flex items-center text-neutral-400 hover:text-neutral-600">
                            <i class="fa fa-eye-slash"></i>
                        </button>
                    </div>
                </div>
                
                <!-- 记住我 -->
                <div class="flex items-center justify-between">
                    <div class="flex items-center">
                        <input type="checkbox" id="remember-me" name="remember-me" class="h-4 w-4 text-primary focus:ring-primary border-neutral-300 rounded">
                        <label for="remember-me" class="ml-2 block text-sm text-neutral-700">记住我</label>
                    </div>
                    <a href="#" class="text-sm text-primary hover:text-primary/80">忘记密码?</a>
                </div>
                
                <!-- 登录按钮 -->
                <div>
                    <button type="submit" class="w-full bg-gradient-primary text-white font-medium py-2 px-4 rounded-md hover:opacity-90 transition-all-300 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary">
                        登录
                    </button>
                </div>
            </form>
        </div>
        
        <!-- 错误提示 -->
        <div id="error-message" class="mt-4 bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-md text-sm hidden">
            <div class="flex items-center">
                <i class="fa fa-exclamation-circle mr-2"></i>
                <span id="error-text"></span>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script>
        // 切换密码可见性
        document.getElementById('toggle-password').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const icon = this.querySelector('i');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            }
        });
        
        // 登录表单提交
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('error-message');
            const errorText = document.getElementById('error-text');
            
            // 简单的表单验证
            if (!username || !password) {
                errorText.textContent = '请输入用户名和密码';
                errorMessage.classList.remove('hidden');
                return;
            }
            
            // 模拟登录验证（实际项目中应该发送请求到服务器）
            if (username === 'admin' && password === 'admin123') {
                // 登录成功，跳转到管理后台首页
                window.location.href = 'dashboard.html';
            } else {
                // 登录失败，显示错误信息
                errorText.textContent = '用户名或密码错误';
                errorMessage.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
